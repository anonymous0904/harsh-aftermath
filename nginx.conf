events { worker_connections 1024; }

http {
    upstream my_web_servers {
        # 'web' refers to the service name in docker-compose
        server web:80;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://my_web_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}